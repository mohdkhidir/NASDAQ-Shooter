  factory:    { icon:'🏭', label:'Factory/Industrial',yieldBase:.058, maint:.20, occBase:.88, buildable:false,

  skyscraper: { icon:'🏙️', label:'Skyscraper',       yieldBase:.080, maint:.35, occBase:.75, buildable:false,
                 img:'🏙️🌃🌆\n💎💎💎\n🛣️🛣️🛣️',  areas:['megacity'] },
  mall:       { icon:'🏬', label:'Shopping Mall',    yieldBase:.072, maint:.33, occBase:.70, buildable:false,
                 img:'🏬🏬🏬\n👥👥👥\n🛣️🛣️🛣️',  areas:['urban','megacity'] },
  hotel:      { icon:'🏨', label:'Hotel',             yieldBase:.085, maint:.40, occBase:.68, buildable:false,
                 img:'🏨🌟🌟\n🛎️🛎️🛎️\n🛣️🛣️🛣️',  areas:['urban','megacity'] },

/* ── Improvements ─────────────────────────────────────────── */
const IMPROVEMENTS = [

  {id:'utilities',  icon:'🔌', name:'Utility Upgrade',  cost:12000,  valuePct:.06, incPct:.05, area:['village','town','urban','megacity']},

/* ── Buildable options on land ────────────────────────────── */
const BUILD_OPTIONS = {
  village:  [{type:'house',label:'🏠 House',      baseM:0.8},{type:'farm',label:'🌾 Farm',         baseM:0.6},{type:'shop',label:'🏪 Small Shop',baseM:0.9}],
  town:     [{type:'house',label:'🏠 House',      baseM:1.0},{type:'apartment',label:'🏢 Apartment',baseM:1.5},{type:'shop',label:'🏪 Shop',  baseM:1.2},{type:'factory',label:'🏭 Factory',baseM:1.3}],
  urban:    [{type:'apartment',label:'🏢 Apartment',baseM:1.8},{type:'office',label:'🏛️ Office',    baseM:2.0},{type:'mall',label:'🏬 Mall',   baseM:2.5},{type:'hotel',label:'🏨 Hotel',   baseM:2.8}],
  megacity: [{type:'skyscraper',label:'🏙️ Skyscraper',baseM:3.5},{type:'mall',label:'🏬 Mega Mall',baseM:3.0},{type:'hotel',label:'🏨 Hotel',baseM:3.2}],
};

/* ── Neighborhood names per area ─────────────────────────── */
const HOODS = {
  village:  ['Meadow Lane','Green Acres','Riverside','Hillside','Old Village','Creekside','Sunflower Farm','Maple Grove'],
  town:     ['Main Street','Market Square','High Street','Town Centre','North End','South Side','Elm Quarter','Bridge Road'],
  urban:    ['Financial District','Tech Quarter','Midtown','Harbor View','Uptown','Silicon Mile','Commerce Park','Arts District'],
  megacity: ['Downtown Core','Central Business','Platinum Mile','Sky Quarter','Diamond District','Global Hub','Prestige Row','Apex Zone'],
};

/* ═════════════════════════════════════════════════════════════
   STATE
═════════════════════════════════════════════════════════════ */
let currentTab='market', filterArea='all', filterType='all';
let areaDemand = { village:55, town:68, urban:80, megacity:92 };
let listings=[];

/* ─────────────────────────────────────────────────────────────
   PERSISTENCE
───────────────────────────────────────────────────────────── */
function loadRE(){try{const d=JSON.parse(localStorage.getItem(RE_KEY)||'null'); return d||mkRE();}catch{return mkRE();}}
function mkRE(){return{properties:[],totalEarned:0,totalTaxPaid:0,totalSpent:0,pendingIncome:0,pendingDebits:0,lastSyncDay:0,demand:null};}
function saveRE(re){try{localStorage.setItem(RE_KEY,JSON.stringify(re));}catch{}}
function loadSH(){try{return JSON.parse(localStorage.getItem(SH_KEY)||'null')||{};}catch{return{};}}
function saveSH(sh){try{localStorage.setItem(SH_KEY,JSON.stringify(sh));}catch{}}
function getCash(){return loadSH().cash||0;}
function getDay(){return loadSH().day||1;}
function deductCash(amt){const sh=loadSH();sh.cash=Math.max(0,(sh.cash||0)-amt);saveSH(sh);}
function addCash(amt){const sh=loadSH();sh.cash=(sh.cash||0)+amt;saveSH(sh);}
function syncBack(){
  const sh=loadSH(),re=loadRE();
  sh.rePropertyValue=re.properties.reduce((s,p)=>s+(p.currentValue||0),0);
  saveSH(sh);
}
function reBack(){
  syncBack();
  if(window.parent!==window){window.parent.postMessage('closeRE','*');return false;}
  window.location.href='index.html'; return false;
}

/* ─────────────────────────────────────────────────────────────
   DEMAND SIMULATION
───────────────────────────────────────────────────────────── */
function initDemand(){
  const re=loadRE();
  if(re.demand){areaDemand=re.demand;}
  else{areaDemand={village:55+rand(-5,5),town:68+rand(-5,5),urban:80+rand(-5,5),megacity:92+rand(-3,3)};}
}
function tickDemand(){
  const re=loadRE();
  ['village','town','urban','megacity'].forEach(a=>{
    const shift=rand(-2,2)+(AREAS[a].popGrowth*0.1);
    areaDemand[a]=Math.max(20,Math.min(100,areaDemand[a]+shift));
  });
  re.demand=areaDemand;
  saveRE(re);
}
function rand(lo,hi){return lo+(Math.random()*(hi-lo));}

/* ─────────────────────────────────────────────────────────────
   INCOME PROCESSING (runs on load / daily)
───────────────────────────────────────────────────────────── */
function processIncome(){
  const re=loadRE(); const day=getDay();
  if(!re.properties.length){saveRE(re);return;}
  const daysSince=Math.max(0,day-(re.lastSyncDay||day));
  if(daysSince<=0)return;
  let incomeTotal=0, taxTotal=0;
  re.properties.forEach(p=>{
    const area=AREAS[p.area];
    const demand=areaDemand[p.area]||70;
    const occFactor=Math.min(1,(demand/100)*1.05);
    const dailyGross=(p.baseRentDay||0)*occFactor;
    const dailyMaint=(p.maintenanceDay||0);
    const dailyTax=(p.currentValue||0)*(area.taxRate/365);
    const dailyNet=dailyGross-dailyMaint-dailyTax;
    const earned=dailyNet*daysSince;
    incomeTotal+=earned; taxTotal+=dailyTax*daysSince;
    p.totalEarned=(p.totalEarned||0)+earned;
    // Appreciation
    const appRate=(AREAS[p.area].popGrowth*0.0001)*(demand/80);
    p.currentValue=Math.round((p.currentValue||p.purchasePrice)*(1+appRate*daysSince));
  });
  re.totalEarned=(re.totalEarned||0)+incomeTotal;
  re.totalTaxPaid=(re.totalTaxPaid||0)+taxTotal;
  re.lastSyncDay=day;
  if(incomeTotal>0){addCash(incomeTotal); re.pendingIncome=(re.pendingIncome||0)+incomeTotal;}
  saveRE(re);
}

/* ─────────────────────────────────────────────────────────────
   LISTING GENERATION
───────────────────────────────────────────────────────────── */
function sr(s){const x=Math.sin(s*9301+49297)*233280;return x-Math.floor(x);}

function calcPrice(type,area,seed){
  const pt=PTYPES[type], ar=AREAS[area];
  const bases={land:30000,farm:25000,house:90000,apartment:350000,shop:200000,office:600000,factory:180000,skyscraper:3000000,mall:1500000,hotel:2000000};
  const base=(bases[type]||100000)*ar.priceMulti;
  return Math.round((base*(0.7+sr(seed)*0.6))/5000)*5000;
}

function genListings(){
  listings=[];
  const seed=Math.floor(Date.now()/180000);
  let idx=0;
  Object.keys(AREAS).forEach(area=>{
    const types=Object.keys(PTYPES).filter(t=>PTYPES[t].areas.includes(area));
    for(let i=0;i<6;i++){
      const s=seed+idx*137; idx++;
      const type=types[Math.floor(sr(s+10)*types.length)];
      const pt=PTYPES[type];
      const ar=AREAS[area];
      const price=calcPrice(type,area,s);
      const demand=areaDemand[area]||70;
      const occFactor=Math.min(1,(demand/100)*1.05);
      const grossDay=price*pt.yieldBase/365;
      const maintDay=grossDay*pt.maint;
      const netDay=+(grossDay*occFactor-maintDay).toFixed(2);
      const hood=HOODS[area];
      listings.push({
        id:'l'+s, type, area,
        name:genName(type,s),
        location:hood[Math.floor(sr(s+3)*hood.length)],
        price, netDay,
        grossYield:+(pt.yieldBase*100).toFixed(2),
        netYield:+((netDay*365/price)*100).toFixed(2),
        occupancy:Math.round(occFactor*100),
        size:Math.round(sr(s+4)*500+40),
        tier:Math.floor(sr(s+5)*3)+1,
      });
    }
  });
}

function genName(type,seed){
  const n={
    land:     ['Prime Corner Lot','Development Parcel','Growth Zone Plot','Greenfield Site','Corner Block','Zoned Parcel'],
    farm:     ['Hillside Farm','Valley Farm','Sunrise Ranch','Harvest Fields','Green Pastures','Orchard Estate'],
    house:    ['Garden Villa','Modern Townhouse','Heritage Home','Brick Rowhouse','Sunset Cottage','Urban Retreat'],
    apartment:['Meridian Residences','Skyline Flats','The Pinnacle','City View Complex','Harbor Suites','The Grand'],
    shop:     ['Main Street Shop','Market Strip','Corner Boutique','Retail Unit','Commercial Space','Trade Square'],
    office:   ['Executive Tower','Commerce Plaza','Innovation House','Corporate Suite','The Exchange','Business Hub'],
    factory:  ['Logistics Hub','Distribution Depot','Manufacturing Unit','Tech Warehouse','Industrial Park','Production Yard'],
    skyscraper:['Apex Tower','Pinnacle One','Diamond Heights','Central Tower','Sky Landmark','Prestige Centre'],
    mall:     ['Shopping Promenade','Mega Mall','Retail Park','The Arcade','Trade Centre','Commercial Complex'],
    hotel:    ['Grand Hotel','City Suites','Luxury Inn','Premier Hotel','Business Hotel','Boutique Hotel'],
  };
  const arr=n[type]||['Property'];
  return arr[Math.floor(sr(seed+20)*arr.length)];
}

/* ─────────────────────────────────────────────────────────────
   RENDER MARKETPLACE
───────────────────────────────────────────────────────────── */
function renderMarket(){
  const cash=getCash();
  const container=document.getElementById('area-grid');
  container.innerHTML='';

  // Filter controls
  const filterBar=document.createElement('div');
  filterBar.className='filter-bar';
  filterBar.innerHTML=`
    <div class="filter-group">
      <span class="filter-lbl">Area:</span>
      ${['all','village','town','urban','megacity'].map(a=>`<button class="fb${filterArea===a?' active':''}" data-fa="${a}">${a==='all'?'All Areas':AREAS[a].emoji+' '+AREAS[a].label}</button>`).join('')}
    </div>
    <div class="filter-group">
      <span class="filter-lbl">Type:</span>
      ${['all','land','house','apartment','shop','office','factory'].map(t=>`<button class="fb${filterType===t?' active':''}" data-ft="${t}">${t==='all'?'All Types':PTYPES[t]?.icon+' '+PTYPES[t]?.label}</button>`).join('')}
    </div>
  `;
  container.appendChild(filterBar);

  // Group listings by area
  Object.keys(AREAS).forEach(area=>{
    if(filterArea!=='all'&&filterArea!==area)return;
    const ar=AREAS[area];
    const demand=areaDemand[area]||70;
    const areaListings=listings.filter(l=>l.area===area&&(filterType==='all'||l.type===filterType));
    if(!areaListings.length)return;

    const section=document.createElement('div');
    section.className='area-section';
    section.style.cssText=`border:1px solid ${ar.border};border-radius:14px;overflow:hidden;margin-bottom:16px;`;

    const demandColor=demand>=80?'#3fb950':demand>=60?'#fbbf24':'#f85149';
    section.innerHTML=`
      <div class="area-header" style="background:${ar.grad};border-bottom:1px solid ${ar.border}">
        <div class="area-header-left">
          <span class="area-emoji">${ar.emoji}</span>
          <div>
            <div class="area-name" style="color:${ar.accent}">${ar.label}</div>
            <div class="area-sub">Tax rate ${(ar.taxRate*100).toFixed(1)}%/yr · Pop growth ${ar.popGrowth}%/yr</div>
          </div>
        </div>
        <div class="area-demand">
          <div class="demand-label">Market Demand</div>
          <div class="demand-bar-wrap"><div class="demand-bar" style="width:${demand}%;background:${demandColor}"></div></div>
          <div class="demand-val" style="color:${demandColor}">${Math.round(demand)}%</div>
        </div>
      </div>
      <div class="area-listings" id="listings-${area}"></div>
    `;
    container.appendChild(section);

    const grid=section.querySelector(`#listings-${area}`);
    areaListings.forEach(l=>{
      const pt=PTYPES[l.type];
      const canAfford=cash>=l.price;
      const card=document.createElement('div');
      card.className='listing-card';
      card.innerHTML=`
        <div class="lc-visual" style="background:${AREAS[l.area].grad};border-bottom:1px solid ${AREAS[l.area].border}">
          <div class="lc-visual-inner">${pt.img||pt.icon}</div>
          <span class="lc-type-badge" style="background:${AREAS[l.area].border}22;color:${ar.accent};border:1px solid ${ar.border}">${pt.label}</span>
        </div>
        <div class="lc-body">
          <div class="lc-name">${l.name}</div>
          <div class="lc-loc">📍 ${l.location} · ${l.size} m²</div>
          <div class="lc-stats-grid">
            <div class="lst"><div class="lst-lbl">Net Yield/yr</div><div class="lst-val green">${l.netYield}%</div></div>
            <div class="lst"><div class="lst-lbl">Income/Day</div><div class="lst-val green">${fmtF(l.netDay)}</div></div>
            <div class="lst"><div class="lst-lbl">Occupancy</div><div class="lst-val">${l.occupancy}%</div></div>
            <div class="lst"><div class="lst-lbl">Tax/yr</div><div class="lst-val red">${fmtK(l.price*AREAS[l.area].taxRate)}</div></div>
          </div>
          <div class="lc-foot">
            <div class="lc-price">${fmtK(l.price)}</div>
            <button class="btn-purchase${canAfford?'':' disabled'}" data-lid="${l.id}" ${canAfford?'':'disabled'}>
              ${canAfford?'🏗 Purchase':'⚠ Need '+fmtK(l.price-cash)+' more'}
            </button>
          </div>
        </div>
      `;
      card.querySelector('.btn-purchase').addEventListener('click',()=>buyListing(l));
      grid.appendChild(card);
    });
  });

  // Wire filter buttons
  container.querySelectorAll('[data-fa]').forEach(b=>b.onclick=()=>{filterArea=b.dataset.fa;renderMarket();});
  container.querySelectorAll('[data-ft]').forEach(b=>b.onclick=()=>{filterType=b.dataset.ft;renderMarket();});
}

/* ─────────────────────────────────────────────────────────────
   RENDER MY PROPERTIES
───────────────────────────────────────────────────────────── */
function renderMyProps(){
  const re=loadRE(); const cash=getCash();
  const inv=re.properties.reduce((s,p)=>s+p.purchasePrice,0);
  const val=re.properties.reduce((s,p)=>s+(p.currentValue||p.purchasePrice),0);
  const netDay=re.properties.reduce((s,p)=>s+(p.netIncomeDay||0),0);
  const taxDay=re.properties.reduce((s,p)=>s+(p.currentValue||p.purchasePrice)*AREAS[p.area].taxRate/365,0);

  document.getElementById('props-summary').innerHTML=`
    <div class="summary-strip">
      <div class="sum-card"><div class="sum-lbl">Total Invested</div><div class="sum-val">${fmtK(inv)}</div></div>
      <div class="sum-card"><div class="sum-lbl">Portfolio Value</div><div class="sum-val orange">${fmtK(val)}</div>
        <div class="sum-sub ${val>=inv?'green':'red'}">${val>=inv?'+':''}${fmtK(val-inv)} (${inv>0?((val-inv)/inv*100).toFixed(1):0}%)</div>
      </div>
      <div class="sum-card"><div class="sum-lbl">Net Income/Day</div><div class="sum-val green">${fmtF(netDay)}</div></div>
      <div class="sum-card"><div class="sum-lbl">Tax Cost/Day</div><div class="sum-val red">${fmtF(taxDay)}</div></div>
      <div class="sum-card"><div class="sum-lbl">Total Earned</div><div class="sum-val green">${fmtK(re.totalEarned||0)}</div></div>
      <div class="sum-card"><div class="sum-lbl">Tax Paid</div><div class="sum-val red">${fmtK(re.totalTaxPaid||0)}</div></div>
    </div>
  `;

  const list=document.getElementById('props-list');
  if(!re.properties.length){
    list.innerHTML='<div class="empty-state"><div style="font-size:48px">🏗️</div><div class="empty-title">No Properties Yet</div><div class="empty-sub">Visit the Marketplace tab to acquire your first property.</div></div>';
    return;
  }
  list.innerHTML='';
  re.properties.slice().reverse().forEach(p=>{
    const ar=AREAS[p.area];
    const pt=PTYPES[p.type];
    const demand=areaDemand[p.area]||70;
    const pnl=(p.currentValue||p.purchasePrice)-p.purchasePrice;
    const pnlPct=(pnl/p.purchasePrice*100).toFixed(1);
    const taxDay=(p.currentValue||p.purchasePrice)*ar.taxRate/365;
    const card=document.createElement('div');
    card.className='my-prop-card';
    card.style.borderColor=ar.border;
    card.innerHTML=`
      <div class="mpc-header" style="background:${ar.grad}">
        <div class="mpc-header-left">
          <span style="font-size:28px">${pt.icon}</span>
          <div>
            <div class="mpc-name">${p.name}</div>
            <div class="mpc-loc">📍 ${p.location} · <span style="color:${ar.accent}">${ar.emoji} ${ar.label}</span></div>
          </div>
        </div>
        <div class="mpc-value-box">
          <div class="mpc-value">${fmtK(p.currentValue||p.purchasePrice)}</div>
          <div class="mpc-pnl ${pnl>=0?'green':'red'}">${pnl>=0?'▲':'▼'} ${Math.abs(pnlPct)}%</div>
        </div>
      </div>
      <div class="mpc-body">
        <div class="mpc-stats">
          <div class="mpc-s"><div class="mpc-s-lbl">Income/Day</div><div class="mpc-s-val green">${fmtF(p.netIncomeDay||0)}</div></div>
          <div class="mpc-s"><div class="mpc-s-lbl">Tax/Day</div><div class="mpc-s-val red">${fmtF(taxDay)}</div></div>
          <div class="mpc-s"><div class="mpc-s-lbl">Demand</div><div class="mpc-s-val">${Math.round(demand)}%</div></div>
          <div class="mpc-s"><div class="mpc-s-lbl">Total Earned</div><div class="mpc-s-val green">${fmtK(p.totalEarned||0)}</div></div>
          <div class="mpc-s"><div class="mpc-s-lbl">Upgrades</div><div class="mpc-s-val">${(p.improvements||[]).length}</div></div>
          <div class="mpc-s"><div class="mpc-s-lbl">Size</div><div class="mpc-s-val">${p.size} m²</div></div>
        </div>
        ${p.improvements&&p.improvements.length?`<div class="impr-tags">${p.improvements.map(i=>{const imp=IMPROVEMENTS.find(x=>x.id===i);return imp?`<span class="impr-tag">${imp.icon} ${imp.name}</span>`:''}).join('')}</div>`:''}
        <div class="mpc-actions">
          ${p.type==='land'?`<button class="btn-action btn-build" onclick="openBuildModal('${p.id}')">🏗️ Build</button>`:''}
          <button class="btn-action btn-improve" onclick="openImproveModal('${p.id}')">⬆️ Improve</button>
          <button class="btn-action btn-lease" onclick="toggleLease('${p.id}')">${p.isLeased?'📋 Leased (Edit)':'🤝 Add Lease'}</button>
          <button class="btn-action btn-sell" onclick="sellProperty('${p.id}')">💰 Sell</button>
        </div>
        ${p.isLeased?`<div class="lease-info">📋 <strong>Leased:</strong> ${p.tenant||'Commercial Tenant'} · ${p.leaseType||'Long-term'} · ${fmtF(p.leaseRent||p.netIncomeDay||0)}/day guaranteed</div>`:''}
      </div>
    `;
    list.appendChild(card);
  });
}

   RENDER MARKET REPORT

  const container=document.getElementById('report-grid');

      <div class="demand-cards">
        ${Object.keys(AREAS).map(a=>{
          const ar=AREAS[a], d=Math.round(areaDemand[a]||70);
          const col=d>=80?'#3fb950':d>=60?'#fbbf24':'#f85149';
          return `<div class="demand-card" style="border-color:${ar.border}">
            <div style="font-size:32px">${ar.emoji}</div>
            <div class="dc-name" style="color:${ar.accent}">${ar.label}</div>
            <div class="dc-demand" style="color:${col}">${d}%</div>

    <div class="report-section">

      <div class="price-table">
        <div class="pt-row pt-head"><span>Area</span><span>Land</span><span>Residential</span><span>Commercial</span><span>Industrial</span></div>
        ${Object.keys(AREAS).map(a=>{
          const ar=AREAS[a];
          return `<div class="pt-row" style="border-left:3px solid ${ar.border}">
            <span style="color:${ar.accent}">${ar.emoji} ${ar.label}</span>
            <span>${fmtK(calcPrice('land',a,100))}</span>
            <span>${fmtK(calcPrice('house',a,200))}</span>
            <span>${fmtK(calcPrice('shop',a,300))}</span>
            <span>${fmtK(PTYPES.factory.areas.includes(a)?calcPrice('factory',a,400):0)||'N/A'}</span>
          </div>`;
        }).join('')}

function generateMarketEvents(){
  const seed=Math.floor(Date.now()/3600000);
  const events=[
    {type:'positive',icon:'📈',title:'Population Growth Surge',desc:'Urban areas see 15% population increase, boosting apartment demand.',effect:'+Urban Demand'},
    {type:'positive',icon:'🏗️',title:'Infrastructure Investment',desc:'New metro line announced through Town district.',effect:'+Town Value'},
    {type:'neutral', icon:'📋',title:'New Zoning Regulations',desc:'Mixed-use zoning approved for residential-commercial areas.',effect:'Rezoning'},
    {type:'negative',icon:'📉',title:'Interest Rate Rise',desc:'Central bank raises rates, cooling property investment.',effect:'-Demand 3%'},
    {type:'positive',icon:'🏢',title:'Tech Company HQ Announced',desc:'Major tech firm to build HQ in Urban district.',effect:'+Urban 8%'},
    {type:'negative',icon:'🌧️',title:'Economic Slowdown',desc:'Village and Town areas see reduced retail spending.',effect:'-Village Occ'},
    {type:'positive',icon:'🌟',title:'Tourism Boom',desc:'Hotel occupancy up 20% in Megacity areas.',effect:'+Megacity Inc'},
    {type:'neutral', icon:'⚖️',title:'Property Tax Review',desc:'Government reviewing property tax rates for next fiscal year.',effect:'Tax Pending'},
  ];
  const r=seed%events.length;
  return [events[r],events[(r+2)%events.length],events[(r+4)%events.length]];
}

/* ─────────────────────────────────────────────────────────────
   BUY PROPERTY
───────────────────────────────────────────────────────────── */
function buyListing(l){
  const cash=getCash();
  if(cash<l.price){toast('Insufficient cash — earn more from stock trading!','#f85149');return;}
  playSound('buy');
  const ar=AREAS[l.area], pt=PTYPES[l.type];
  const demand=areaDemand[l.area]||70;
  const occFactor=Math.min(1,(demand/100)*1.05);
  const grossDay=l.price*pt.yieldBase/365;
  const maintDay=grossDay*pt.maint;
  const netDay=+(grossDay*occFactor-maintDay).toFixed(4);
  const re=loadRE();
  re.properties.push({
    id:'p'+Date.now()+Math.floor(Math.random()*9999),
    type:l.type, area:l.area,
    name:l.name, location:l.location,
    purchasePrice:l.price, currentValue:l.price,
    baseRentDay:+(grossDay*l.occupancy/100).toFixed(4),
    maintenanceDay:+maintDay.toFixed(4),
    netIncomeDay:netDay,
    occupancy:l.occupancy, size:l.size,
    improvements:[],
    isLeased:false, tenant:null,
    totalEarned:0,
    boughtDay:getDay(),
  });
  re.pendingDebits=(re.pendingDebits||0)+l.price;
  saveRE(re); deductCash(l.price);
  updateTopBar(); renderListings(); renderMarket();
  toast(`✅ ${l.name} purchased for ${fmtK(l.price)}!`,'#238636');
  setTimeout(()=>switchTab('myprops'),600);
}

/* ─────────────────────────────────────────────────────────────
   BUILD ON LAND
───────────────────────────────────────────────────────────── */
function openBuildModal(propId){
  const re=loadRE();
  const p=re.properties.find(x=>x.id===propId); if(!p)return;
  const ar=AREAS[p.area], options=BUILD_OPTIONS[p.area]||[];
  const cash=getCash();
  document.getElementById('build-modal-body').innerHTML=`
    <div class="modal-header" style="background:${ar.grad}">
      <div class="modal-title">🏗️ Build on ${p.name}</div>
      <div class="modal-sub">${ar.emoji} ${ar.label} · ${p.location}</div>
      <button class="modal-close" onclick="closeModal('build-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="build-options">
        ${options.map(opt=>{
          const pt=PTYPES[opt.type];
          const buildCost=Math.round(p.currentValue*opt.baseM);
          const newValue=Math.round(p.currentValue*(1+opt.baseM*0.4));
          const canAfford=cash>=buildCost;
          return `<div class="build-option ${canAfford?'':'unaffordable'}">
            <div class="bo-icon">${pt.icon}</div>
            <div class="bo-info">
              <div class="bo-name">${opt.label}</div>
              <div class="bo-desc">${pt.label}</div>
              <div class="bo-val">Value after: ${fmtK(newValue)} · +${fmtK(newValue-p.currentValue)}</div>
            </div>
            <button class="btn-build-opt" onclick="buildOn('${propId}','${opt.type}',${buildCost},${newValue})" ${canAfford?'':'disabled'}>
              ${canAfford?'Build '+fmtK(buildCost):'Need '+fmtK(buildCost)}
            </button>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
  document.getElementById('build-modal').classList.remove('hidden');
}

function buildOn(propId,type,cost,newValue){
  const cash=getCash();
  if(cash<cost){toast('Insufficient cash','#f85149');return;}
  const re=loadRE();
  const p=re.properties.find(x=>x.id===propId); if(!p)return;
  const pt=PTYPES[type], ar=AREAS[p.area];
  const demand=areaDemand[p.area]||70;
  const occFactor=Math.min(1,(demand/100)*1.05);
  const grossDay=newValue*pt.yieldBase/365;
  const maintDay=grossDay*pt.maint;
  p.type=type; p.currentValue=newValue;
  p.baseRentDay=+(grossDay*occFactor).toFixed(4);
  p.maintenanceDay=+maintDay.toFixed(4);
  p.netIncomeDay=+(grossDay*occFactor-maintDay).toFixed(4);
  p.buildingCost=(p.buildingCost||0)+cost;
  saveRE(re); deductCash(cost);
  closeModal('build-modal'); renderMyProps(); updateTopBar();
  playSound('build');
  toast(`🏗️ ${PTYPES[type].label} built! Property value increased to ${fmtK(newValue)}`,'#1f6feb');
}

/* ─────────────────────────────────────────────────────────────
   IMPROVEMENTS
───────────────────────────────────────────────────────────── */
function openImproveModal(propId){
  const re=loadRE();
  const p=re.properties.find(x=>x.id===propId); if(!p)return;
  const ar=AREAS[p.area]; const cash=getCash();
  const owned=p.improvements||[];
  const available=IMPROVEMENTS.filter(i=>i.area.includes(p.area)&&!owned.includes(i.id));
  document.getElementById('prop-modal-body').innerHTML=`
    <div class="modal-header" style="background:${ar.grad}">
      <div class="modal-title">⬆️ Improve: ${p.name}</div>
      <div class="modal-sub">Current value: ${fmtK(p.currentValue||p.purchasePrice)}</div>
      <button class="modal-close" onclick="closeModal('prop-modal')">✕</button>
    </div>
    <div class="modal-body">
      ${owned.length?`<div class="owned-imprs"><div class="oi-title">Installed Improvements</div><div class="oi-tags">${owned.map(id=>{const i=IMPROVEMENTS.find(x=>x.id===id);return i?`<span class="oi-tag">${i.icon} ${i.name}</span>`:''}).join('')}</div></div>`:''}
      <div class="improve-grid">
        ${available.length?available.map(imp=>{
          const canAfford=cash>=imp.cost;
          const valInc=Math.round((p.currentValue||p.purchasePrice)*imp.valuePct);
          const incInc=((p.netIncomeDay||0)*imp.incPct);
          return `<div class="imp-card ${canAfford?'':'unaffordable'}">
            <div class="imp-icon">${imp.icon}</div>
            <div class="imp-name">${imp.name}</div>
            <div class="imp-effect">+${(imp.valuePct*100).toFixed(0)}% value · +${(imp.incPct*100).toFixed(0)}% income</div>
            <div class="imp-nums">+${fmtK(valInc)} value · +${fmtF(incInc)}/day</div>
            <button class="btn-impr" onclick="addImprovement('${propId}','${imp.id}')" ${canAfford?'':'disabled'}>
              ${canAfford?fmtK(imp.cost):'Need '+fmtK(imp.cost)}
            </button>
          </div>`;
        }).join(''):`<div class="empty-state" style="padding:24px">All improvements installed! 🎉</div>`}
      </div>
    </div>
  `;
  document.getElementById('prop-modal').classList.remove('hidden');
}

function addImprovement(propId,impId){
  const cash=getCash(); const imp=IMPROVEMENTS.find(i=>i.id===impId); if(!imp)return;
  if(cash<imp.cost){toast('Insufficient cash','#f85149');return;}
  const re=loadRE();
  const p=re.properties.find(x=>x.id===propId); if(!p)return;
  if(!p.improvements)p.improvements=[];
  p.improvements.push(impId);
  p.currentValue=Math.round((p.currentValue||p.purchasePrice)*(1+imp.valuePct));
  p.netIncomeDay=+(((p.netIncomeDay||0)*(1+imp.incPct))).toFixed(4);
  saveRE(re); deductCash(imp.cost);
  closeModal('prop-modal');
  openImproveModal(propId); // reopen updated
  renderMyProps(); updateTopBar();
  playSound('improve');
  toast(`${imp.icon} ${imp.name} added! Property value +${(imp.valuePct*100).toFixed(0)}%`,'#1f6feb');
}

/* ─────────────────────────────────────────────────────────────
   LEASE
───────────────────────────────────────────────────────────── */
function toggleLease(propId){
  const re=loadRE();
  const p=re.properties.find(x=>x.id===propId); if(!p)return;
  const tenants=['Blue Chip Corp','Metro Retail Ltd','TechSpace Inc','National Logistics','Urban Living Co','Prime Holdings'];
  const leaseTypes=['Long-term (3yr)','Medium-term (1yr)','Short-term (6mo)'];
  if(!p.isLeased){
    p.isLeased=true;
    p.tenant=tenants[Math.floor(Math.random()*tenants.length)];
    p.leaseType=leaseTypes[Math.floor(Math.random()*leaseTypes.length)];
    p.leaseRent=+((p.netIncomeDay||0)*1.05).toFixed(4);
    toast(`🤝 Lease signed with ${p.tenant}!`,'#238636');
  } else {
    p.isLeased=false; p.tenant=null; p.leaseRent=0;
    toast('📋 Lease terminated','#f85149');
  }
  saveRE(re); renderMyProps();
}

/* ─────────────────────────────────────────────────────────────
   SELL PROPERTY
───────────────────────────────────────────────────────────── */
function sellProperty(propId){
  const re=loadRE();
  const p=re.properties.find(x=>x.id===propId); if(!p)return;
  const salePrice=p.currentValue||p.purchasePrice;
  const gain=salePrice-p.purchasePrice;
  const tax=gain>0?Math.round(gain*0.20):0;
  const proceeds=salePrice-tax;
  if(!confirm(`Sell ${p.name} for ${fmtK(salePrice)}?\n\nCapital gain: ${fmtK(gain)}\nCGT (20%): ${fmtK(tax)}\nNet proceeds: ${fmtK(proceeds)}`))return;
  re.properties=re.properties.filter(x=>x.id!==propId);
  saveRE(re); addCash(proceeds);
  renderMyProps(); updateTopBar();
  playSound('sell');
  toast(`💰 Sold for ${fmtK(salePrice)} · Net ${fmtK(proceeds)} after ${fmtK(tax)} CGT`,'#1f6feb');
}

/* ─────────────────────────────────────────────────────────────
   TOP BAR
───────────────────────────────────────────────────────────── */
function updateTopBar(){
  const re=loadRE(), cash=getCash();
  const val=re.properties.reduce((s,p)=>s+(p.currentValue||p.purchasePrice),0);
  const netDay=re.properties.reduce((s,p)=>s+(p.netIncomeDay||0),0);
  const taxDay=re.properties.reduce((s,p)=>s+(p.currentValue||p.purchasePrice)*AREAS[p.area].taxRate/365,0);
  document.getElementById('tb-cash').textContent=fmtK(cash);
  document.getElementById('tb-rev').textContent=fmtK(val);
  document.getElementById('tb-cnt').textContent=re.properties.length;
  document.getElementById('tb-inc').textContent=fmtF(netDay)+'/day';
  document.getElementById('tb-tax').textContent=fmtF(taxDay)+'/day';
}

/* ─────────────────────────────────────────────────────────────
   TAB SWITCHING
───────────────────────────────────────────────────────────── */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id==='tab-'+tab));
  if(tab==='market')renderMarket();
  else if(tab==='myprops'){processIncome();renderMyProps();}
  else if(tab==='report')renderReport();
}
document.querySelectorAll('.nav-tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

/* ─────────────────────────────────────────────────────────────
   MODALS
───────────────────────────────────────────────────────────── */
function closeModal(id){document.getElementById(id).classList.add('hidden');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.onclick=e=>{if(e.target===o)o.classList.add('hidden');});

/* ─────────────────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────────────────── */
function toast(msg,col){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=col||'#238636';
  t.style.color='#fff'; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),3000);
}

/* ─────────────────────────────────────────────────────────────
   SOUNDS (Web Audio API)
───────────────────────────────────────────────────────────── */
let _ac=null;
function getAC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function playSound(type){
  try{
    const ac=getAC();
    if(type==='buy'){
      [[440,.1],[550,.18],[660,.28]].forEach(([f,t])=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);o.type='triangle';o.frequency.value=f;
        const st=ac.currentTime+t;
        g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.18,st+.02);g.gain.exponentialRampToValueAtTime(.001,st+.35);
        o.start(st);o.stop(st+.4);
      });
    } else if(type==='build'){
      [220,330,440,330,440,550].forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);o.type='square';o.frequency.value=f;
        const st=ac.currentTime+i*.08;
        g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.10,st+.01);g.gain.exponentialRampToValueAtTime(.001,st+.2);
        o.start(st);o.stop(st+.2);
      });
    } else if(type==='improve'){
      [523,659,784,1047].forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);o.type='triangle';o.frequency.value=f;
        const st=ac.currentTime+i*.12;
        g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.15,st+.02);g.gain.exponentialRampToValueAtTime(.001,st+.5);
        o.start(st);o.stop(st+.5);
      });
    } else if(type==='sell'){
      [660,550,440].forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);o.type='sawtooth';o.frequency.value=f;
        const st=ac.currentTime+i*.1;
        g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.12,st+.01);g.gain.exponentialRampToValueAtTime(.001,st+.3);
        o.start(st);o.stop(st+.3);
      });
    }
  }catch(e){}
}
