<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="72%">
      <stop offset="0%" stop-color="#1c2a3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="55%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#56d364"/>
    </linearGradient>
    <linearGradient id="candleGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#56d364"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="halo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rnd"><rect width="512" height="512" rx="100" ry="100"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Grid -->
  <g clip-path="url(#rnd)" stroke="#1e2d3d" stroke-width="1.2" opacity="0.9">
    <line x1="0" y1="154" x2="512" y2="154"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="358" x2="512" y2="358"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Chart area fill -->
  <polygon clip-path="url(#rnd)"
    points="60,380 130,330 200,346 272,278 340,212 400,152 440,104 440,450 60,450"
    fill="url(#areaFill)"/>

  <!-- Candlestick bars (decorative, lower-left) -->
  <!-- Bear 1 -->
  <line x1="80" y1="312" x2="80" y2="400" stroke="#f85149" stroke-width="2" opacity="0.4" clip-path="url(#rnd)"/>
  <rect x="71" y="328" width="18" height="52" rx="3" fill="#f85149" opacity="0.65" clip-path="url(#rnd)"/>
  <!-- Bear 2 -->
  <line x1="112" y1="290" x2="112" y2="380" stroke="#f85149" stroke-width="2" opacity="0.4" clip-path="url(#rnd)"/>
  <rect x="103" y="302" width="18" height="44" rx="3" fill="#f85149" opacity="0.65" clip-path="url(#rnd)"/>
  <!-- Bull 1 (reversal) -->
  <line x1="144" y1="272" x2="144" y2="365" stroke="#3fb950" stroke-width="2" opacity="0.5" clip-path="url(#rnd)"/>
  <rect x="135" y="284" width="18" height="50" rx="3" fill="url(#candleGreen)" opacity="0.75" clip-path="url(#rnd)"/>
  <!-- Bull 2 -->
  <line x1="176" y1="246" x2="176" y2="340" stroke="#3fb950" stroke-width="2" opacity="0.5" clip-path="url(#rnd)"/>
  <rect x="167" y="258" width="18" height="52" rx="3" fill="url(#candleGreen)" opacity="0.75" clip-path="url(#rnd)"/>
  <!-- Bull 3 (strong) -->
  <line x1="208" y1="220" x2="208" y2="318" stroke="#3fb950" stroke-width="2" opacity="0.5" clip-path="url(#rnd)"/>
  <rect x="199" y="232" width="18" height="58" rx="3" fill="url(#candleGreen)" opacity="0.75" clip-path="url(#rnd)"/>

  <!-- Main chart line with gradient + glow -->
  <polyline clip-path="url(#rnd)"
    points="60,380 130,330 200,346 272,278 340,212 400,152 440,104"
    fill="none" stroke="url(#lineGrad)" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Soft glow halo at tip -->
  <circle cx="440" cy="104" r="44" fill="#3fb950" opacity="0.08" filter="url(#halo)" clip-path="url(#rnd)"/>

  <!-- Crosshair / targeting reticle at peak -->
  <!-- Outer ring -->
  <circle cx="440" cy="104" r="38" fill="none" stroke="#3fb950" stroke-width="2.5" opacity="0.85" clip-path="url(#rnd)"/>
  <!-- Inner ring -->
  <circle cx="440" cy="104" r="22" fill="none" stroke="#3fb950" stroke-width="1.8" opacity="0.55" clip-path="url(#rnd)"/>
  <!-- Core dot -->
  <circle cx="440" cy="104" r="7" fill="#3fb950" filter="url(#glow)" clip-path="url(#rnd)"/>
  <!-- Crosshair arms (only left and bottom to stay in-bounds) -->
  <line x1="394" y1="104" x2="410" y2="104" stroke="#3fb950" stroke-width="2.5" opacity="0.85" clip-path="url(#rnd)"/>
  <line x1="440" y1="58" x2="440" y2="74" stroke="#3fb950" stroke-width="2.5" opacity="0.85" clip-path="url(#rnd)"/>
  <line x1="440" y1="134" x2="440" y2="150" stroke="#3fb950" stroke-width="2.5" opacity="0.85" clip-path="url(#rnd)"/>

  <!-- Bottom wordmark -->
  <text x="260" y="462"
    text-anchor="middle"
    font-family="'Arial Black','Impact',sans-serif"
    font-size="30" font-weight="900"
    fill="#8b949e" letter-spacing="7" opacity="0.7">NASDAQ</text>
  <rect x="152" y="438" width="216" height="1.5" rx="1" fill="#30363d" opacity="0.6"/>
</svg>
